<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>

  <!-- Outer hexagon (the manifold boundary) -->
  <polygon points="200,60 310,120 310,240 200,300 90,240 90,120"
           fill="none" stroke="url(#edge)" stroke-width="1.5" opacity="0.4"/>

  <!-- Inner graph edges (friction paths) -->
  <line x1="200" y1="110" x2="260" y2="155" stroke="url(#edge)" stroke-width="1.2"/>
  <line x1="200" y1="110" x2="140" y2="155" stroke="url(#edge)" stroke-width="1.2"/>
  <line x1="260" y1="155" x2="260" y2="215" stroke="url(#edge)" stroke-width="1.2"/>
  <line x1="140" y1="155" x2="140" y2="215" stroke="url(#edge)" stroke-width="1.2"/>
  <line x1="260" y1="215" x2="200" y2="255" stroke="url(#edge)" stroke-width="1.2"/>
  <line x1="140" y1="215" x2="200" y2="255" stroke="url(#edge)" stroke-width="1.2"/>

  <!-- Cross edges (the semantic bridges) -->
  <line x1="140" y1="155" x2="260" y2="215" stroke="url(#edge)" stroke-width="0.8" opacity="0.5"/>
  <line x1="260" y1="155" x2="140" y2="215" stroke="url(#edge)" stroke-width="0.8" opacity="0.5"/>
  <line x1="200" y1="110" x2="200" y2="255" stroke="url(#edge)" stroke-width="0.8" opacity="0.5"/>

  <!-- Graph nodes (tokens in the manifold) -->
  <circle cx="200" cy="110" r="8" fill="url(#glow)" filter="url(#nodeGlow)"/>
  <circle cx="260" cy="155" r="6" fill="url(#glow)" filter="url(#nodeGlow)" opacity="0.85"/>
  <circle cx="140" cy="155" r="6" fill="url(#glow)" filter="url(#nodeGlow)" opacity="0.85"/>
  <circle cx="260" cy="215" r="7" fill="url(#glow)" filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="140" cy="215" r="7" fill="url(#glow)" filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="200" cy="255" r="8" fill="url(#glow)" filter="url(#nodeGlow)"/>

  <!-- Satellite nodes (the embedding dimensions) -->
  <circle cx="200" cy="80" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="290" cy="135" r="3" fill="#bc8cff" opacity="0.5"/>
  <circle cx="290" cy="235" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="110" cy="135" r="3" fill="#bc8cff" opacity="0.5"/>
  <circle cx="110" cy="235" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="200" cy="280" r="3" fill="#bc8cff" opacity="0.5"/>

  <!-- Title -->
  <text x="200" y="335" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="700" letter-spacing="4"
        fill="url(#glow)" filter="url(#textGlow)">BDVE</text>

  <!-- Subtitle -->
  <text x="200" y="362" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400" letter-spacing="3"
        fill="#8b949e">DETERMINISTIC VECTOR EMBEDDINGS</text>
</svg>
